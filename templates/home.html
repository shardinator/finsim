<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinSim. Financial payments simulator.</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: clamp(48px, 10vh, 96px) clamp(24px, 6vw, 64px) 56px;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: #0b2a6f;
        background: #fff;
      }
      .siteHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        width: 100%;
        padding: 0 0 16px;
      }
      .navBrand {
        display: flex;
        align-items: center;
        min-width: 0;
      }
      .navBrand a {
        line-height: 0;
        text-decoration: none;
      }
      .navBrand a:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 4px;
        border-radius: 4px;
      }
      .navActions {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }
      .navLink {
        font-size: 14px;
        font-weight: 600;
        color: #0b2a6f;
        text-decoration: none;
        padding: 8px 10px;
        border-radius: 8px;
      }
      .navLink:hover {
        background: rgba(11, 42, 111, 0.06);
      }
      .navLink:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
      }
      .logo {
        display: block;
        height: 40px;
        width: auto;
      }
      main {
        margin-top: clamp(20px, 4vh, 40px);
        padding: 0;
        max-width: 640px;
      }
      .banksPanel {
        padding: 22px 24px 24px;
        border-radius: 12px;
        background: #edf2f7;
      }
      .banksPanel h2 {
        margin: 0 0 18px;
        padding: 0 2px;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.3;
      }
      .bankStack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .bankItem {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 0;
        padding: 14px 18px;
        min-height: 52px;
        border-radius: 10px;
        background: #fff;
      }
      .bankItemName {
        flex: 0 1 auto;
        width: max-content;
        max-width: 100%;
        min-width: 0;
        margin: 0;
        padding: 3px 6px;
        font: inherit;
        font-size: 15px;
        font-weight: 600;
        line-height: 1.45;
        letter-spacing: -0.01em;
        color: inherit;
        text-align: left;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border-radius: 6px;
        background: transparent;
      }

      .empty {
        margin: 0;
        padding: 4px 2px 2px;
        font-size: 14px;
        line-height: 1.5;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <header class="siteHeader">
      <div class="navBrand">
        <a href="/">
          <img
            class="logo"
            src="/images/FinSimLogo.png"
            alt="FinSim home"
          />
        </a>
      </div>
      <nav class="navActions" aria-label="Main">
        <a href="/settings" class="navLink">Settings</a>
      </nav>
    </header>
    <main>
      <section class="banksPanel" aria-labelledby="banksHeading">
        <h2 id="banksHeading">Banks</h2>
        {% if banks | length == 0 %}
        <p class="empty">No banks yet. Add one from the settings page.</p>
        {% else %}
        <div class="bankStack">
          {% for bank in banks %}
          <div class="bankItem">
            <span class="bankItemName">{{ bank.name }}</span>
          </div>
          {% endfor %}
        </div>
        {% endif %}
      </section>
    </main>

    <script></script>
  </body>
</html>
