<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinSim. Financial payments simulator.</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: clamp(48px, 10vh, 96px) clamp(24px, 6vw, 64px) 56px;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: #0b2a6f;
      }
      .siteHeader {
        padding: 0 0 16px;
      }
      .logo {
        display: block;
        height: 40px;
        width: auto;
      }
      main {
        margin-top: clamp(20px, 4vh, 40px);
        padding: 0;
        max-width: 640px;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 24px;
      }
      .btn {
        appearance: none;
        border: 1px solid #0b2a6f;
        background: #0b2a6f;
        color: #fff;
        font: inherit;
        font-weight: 600;
        font-size: 14px;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
      }
      .btn:hover {
        filter: brightness(1.08);
      }
      .btn:focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }
      .createPanel {
        display: none;
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
        padding: 20px 22px 22px;
        border-radius: 12px;
        background: #f8fafc;
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
        min-width: min(100%, 288px);
        max-width: 420px;
        flex: 1 1 288px;
      }
      .createPanel.visible {
        display: flex;
      }
      .createPanel label {
        display: block;
        margin: 0;
        padding: 0 2px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.35;
        color: #0b2a6f;
      }
      .createPanel form {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
        margin: 0;
      }
      .createPanel input[type="text"] {
        width: 100%;
        margin: 0;
        font: inherit;
        font-size: 15px;
        line-height: 1.4;
        padding: 12px 14px;
        min-height: 48px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        color: #0b2a6f;
        background: #fff;
      }
      .createPanel input[type="text"]::placeholder {
        color: #94a3b8;
      }
      .createPanel input[type="text"]:hover {
        border-color: #94a3b8;
      }
      .createPanel input[type="text"]:focus {
        outline: none;
        border-color: #0b2a6f;
        box-shadow: 0 0 0 3px rgba(11, 42, 111, 0.12);
      }
      .createPanel input[type="text"]:focus-visible {
        outline: none;
        border-color: #0b2a6f;
        box-shadow: 0 0 0 3px rgba(11, 42, 111, 0.12);
      }
      .createPanel .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        padding-top: 2px;
      }
      .createPanel .row .btn {
        min-height: 44px;
        padding-inline: 18px;
      }
      .btnSecondary {
        background: #fff;
        color: #0b2a6f;
      }
      .banksPanel {
        padding: 22px 24px 24px;
        border-radius: 12px;
        background: #f8fafc;
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
      }
      .banksPanel h2 {
        margin: 0 0 18px;
        padding: 0 2px;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.3;
      }
      .bankStack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .bankItem {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 0;
        padding: 14px 18px;
        min-height: 52px;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
      }
      .bankItemName {
        flex: 1 1 auto;
        min-width: 0;
        padding: 2px 12px 2px 2px;
        font-size: 15px;
        font-weight: 600;
        line-height: 1.45;
        letter-spacing: -0.01em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .bankItem form {
        margin: 0;
        flex-shrink: 0;
        align-self: center;
      }
      .btnRemove {
        appearance: none;
        border: 1px solid #fdba74;
        background: #ffedd5;
        color: #c2410c;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.2;
        padding: 8px 14px;
        min-height: 36px;
        border-radius: 8px;
        cursor: pointer;
      }
      .btnRemove:hover {
        color: #9a3412;
        background: #fed7aa;
        border-color: #fb923c;
      }
      .btnRemove:focus-visible {
        outline: 2px solid #ea580c;
        outline-offset: 2px;
      }

      .empty {
        margin: 0;
        padding: 4px 2px 2px;
        font-size: 14px;
        line-height: 1.5;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <header class="siteHeader">
      <img
        class="logo"
        src="/images/FinSimLogo.png"
        alt="FinSim"
      />
    </header>
    <main>
      <div class="toolbar">
        <button type="button" class="btn" id="createBankBtn">
          Create Bank
        </button>
        <div class="createPanel" id="createBankPanel" aria-hidden="true">
          <label for="bankName">Bank name</label>
          <form method="post" action="/banks" id="createBankForm">
            <input
              type="text"
              id="bankName"
              name="name"
              placeholder="e.g. First National"
              required
              maxlength="200"
              autocomplete="organization"
            />
            <div class="row">
              <button type="submit" class="btn">Save</button>
              <button type="button" class="btn btnSecondary" id="cancelCreateBank">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>

      <section class="banksPanel" aria-labelledby="banksHeading">
        <h2 id="banksHeading">Banks</h2>
        {% if banks | length == 0 %}
        <p class="empty">No banks yet. Create one to get started.</p>
        {% else %}
        <div class="bankStack">
          {% for bank in banks %}
          <div class="bankItem">
            <span class="bankItemName">{{ bank.name }}</span>
            <form method="post" action="/banks/{{ bank.id }}/remove">
              <button type="submit" class="btnRemove">Remove</button>
            </form>
          </div>
          {% endfor %}
        </div>
        {% endif %}
      </section>
    </main>
    <script>
      (function () {
        var btn = document.getElementById("createBankBtn");
        var panel = document.getElementById("createBankPanel");
        var cancel = document.getElementById("cancelCreateBank");
        var form = document.getElementById("createBankForm");
        var input = document.getElementById("bankName");

        function openPanel() {
          panel.classList.add("visible");
          panel.setAttribute("aria-hidden", "false");
          input.focus();
        }

        function closePanel() {
          panel.classList.remove("visible");
          panel.setAttribute("aria-hidden", "true");
          form.reset();
        }

        btn.addEventListener("click", function () {
          if (panel.classList.contains("visible")) {
            closePanel();
          } else {
            openPanel();
          }
        });

        cancel.addEventListener("click", closePanel);
      })();
    </script>
  </body>
</html>
